<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jelajah Tata Surya Interaktif</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(to bottom,#000428,#004e92);
    color:white;
    text-align:center;
}

header{
    padding:30px;
}

header h1{
    font-size:40px;
    margin-bottom:10px;
}

header p{
    font-size:18px;
}

.solar-system{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:40px;
}

.planet{
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    font-size:12px;
    color:white;
    animation:rotate 10s linear infinite;
    transition:0.3s;
}

.planet:hover{
    transform:scale(1.2);
}

.mercury{
    width:60px;
    height:60px;
    background:gray;
}

.venus{
    width:80px;
    height:80px;
    background:orange;
}

.earth{
    width:90px;
    height:90px;
    background:deepskyblue;
}

.mars{
    width:75px;
    height:75px;
    background:red;
}

.jupiter{
    width:130px;
    height:130px;
    background:brown;
}

.saturn{
    width:120px;
    height:120px;
    background:gold;
}

.uranus{
    width:100px;
    height:100px;
    background:lightblue;
}

.neptune{
    width:95px;
    height:95px;
    background:blue;
}

@keyframes rotate{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

.info{
    width:80%;
    margin:auto;
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
}

.video{
    margin-top:40px;
}

.quiz{
    margin:40px;
}

button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:gold;
}
</style>
</head>

<body>

<header>
    <h1>🚀 Jelajah Tata Surya Interaktif</h1>
    <p>Klik planet untuk melihat informasi</p>
</header>

<audio controls autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<h2 style="margin-top:20px;">Tata Surya</h2>

<div class="solar-system">

    <div class="planet mercury"
    onclick="showInfo('Merkurius','Planet terdekat dengan Matahari.')">
    Merkurius
    </div>

    <div class="planet venus"
    onclick="showInfo('Venus','Planet terpanas dalam tata surya.')">
    Venus
    </div>

    <div class="planet earth"
    onclick="showInfo('Bumi','Satu-satunya planet yang diketahui memiliki kehidupan.')">
    Bumi
    </div>

    <div class="planet mars"
    onclick="showInfo('Mars','Dikenal sebagai Planet Merah.')">
    Mars
    </div>

    <div class="planet jupiter"
    onclick="showInfo('Jupiter','Planet terbesar dalam tata surya.')">
    Jupiter
    </div>

    <div class="planet saturn"
    onclick="showInfo('Saturnus','Memiliki cincin yang sangat indah.')">
    Saturnus
    </div>

    <div class="planet uranus"
    onclick="showInfo('Uranus','Planet raksasa es.')">
    Uranus
    </div>

    <div class="planet neptune"
    onclick="showInfo('Neptunus','Planet terjauh dari Matahari.')">
    Neptunus
    </div>

</div>

<div class="info" id="infoBox">
    <h2>Informasi Planet</h2>
    <p>Klik salah satu planet di atas.</p>
</div>

<div class="video">
    <h2>Video Edukasi Tata Surya</h2>

    <iframe width="700"
            height="400"
            src="https://www.youtube.com/embed/libKVRa01L8"
            title="Tata Surya"
            allowfullscreen>
    </iframe>
</div>

<div class="quiz">
    <h2>Kuis Interaktif</h2>

    <p>Planet terbesar dalam tata surya adalah?</p>

    <button onclick="cekJawaban('A')">Mars</button>
    <button onclick="cekJawaban('B')">Jupiter</button>
    <button onclick="cekJawaban('C')">Venus</button>

    <h3 id="hasil"></h3>
</div>

<script>

function showInfo(nama, deskripsi){
    document.getElementById("infoBox").innerHTML=
    `
    <h2>${nama}</h2>
    <p>${deskripsi}</p>
    `;
}

function cekJawaban(jawaban){

    if(jawaban==="B"){
        document.getElementById("hasil").innerHTML=
        "✅ Benar! Jupiter adalah planet terbesar.";
    }
    else{
        document.getElementById("hasil").innerHTML=
        "❌ Salah. Coba lagi.";
    }
}

</script>

</body>
</html>
