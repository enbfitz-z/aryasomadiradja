<!DOCTYPE html>
<html>
<head>
<title>Planet Tata Surya</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="judul">Planet Tata Surya</h1>

<div class="planet-container">

    <div class="card" onclick="planetInfo('merkurius')">
        <img src="assets/mercury.png" alt="Merkurius">
        <h2>☿ Merkurius</h2>
    </div>

    <div class="card" onclick="planetInfo('venus')">
        <img src="assets/venus.png" alt="Venus">
        <h2>♀ Venus</h2>
    </div>

    <div class="card" onclick="planetInfo('bumi')">
        <img src="assets/earth.gif" alt="Bumi">
        <h2>🌍 Bumi</h2>
    </div>

    <div class="card" onclick="planetInfo('mars')">
        <img src="assets/mars.png" alt="Mars">
        <h2>♂ Mars</h2>
    </div>

    <div class="card" onclick="planetInfo('jupiter')">
        <img src="assets/jupiter.png" alt="Jupiter">
        <h2>♃ Jupiter</h2>
    </div>

    <div class="card" onclick="planetInfo('saturnus')">
        <img src="assets/saturn.png" alt="Saturnus">
        <h2>♄ Saturnus</h2>
    </div>

    <div class="card" onclick="planetInfo('uranus')">
        <img src="assets/uranus.png" alt="Uranus">
        <h2>♅ Uranus</h2>
    </div>

    <div class="card" onclick="planetInfo('neptunus')">
        <img src="assets/neptune.png" alt="Neptunus">
        <h2>♆ Neptunus</h2>
    </div>

</div>

<a href="index.html" class="btn">
Kembali
</a>

</body>
</html>
